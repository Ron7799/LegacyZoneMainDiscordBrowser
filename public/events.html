<main>


<h1>
📅 אירועים עתידיים
</h1>



<div id="events-container"></div>



</main>





<script>


async function loadEvents(){



const response = await fetch(
"/api/events"
);



const events = await response.json();




const container =
document.getElementById(
"events-container"
);



container.innerHTML="";




if(events.length === 0){



container.innerHTML=`

<div class="event-card">

<h2>
אין כרגע אירועים
</h2>

</div>

`;

return;


}






events.reverse().forEach(event=>{



container.innerHTML += `


<div class="event-card">


<h2>
🎉 ${event.title}
</h2>



<h3>
📅 תאריך: ${event.date}
</h3>



<h3>
⏰ שעה: ${event.time}
</h3>



<p>
📍 מקום: ${event.location}
</p>



<p>
🎁 פרס: ${event.prize}
</p>



<p>
${event.description}
</p>



</div>



`;



});



}



loadEvents();



</script>



</body>
