<main>


<h1>
📢 עדכוני האתר והשרת
</h1>




<div id="updates-container"></div>




</main>








<script>



async function loadUpdates(){



const response = await fetch(
"/api/updates"
);



const updates = await response.json();





const container =
document.getElementById(
"updates-container"
);



container.innerHTML="";





if(updates.length === 0){



container.innerHTML=`

<div class="update-card">

<h2>
אין כרגע עדכונים
</h2>


</div>


`;

return;


}








updates.reverse().forEach(update=>{



container.innerHTML += `



<div class="update-card">


<h2>
📢 ${update.title}
</h2>




<h3>
📅 ${update.date}
</h3>




<p>
${update.message}
</p>



</div>



`;



});




}




loadUpdates();



</script>






</body>
